services:
  openpool:
    build: .
    image: openpool:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - openpool-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true

volumes:
  openpool-data:
