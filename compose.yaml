name: opencodeproxy

services:
  opencodeproxy:
    build: .
    image: h0n3yb0t/opencodeproxy:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - opencodeproxy-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true

volumes:
  opencodeproxy-data:
